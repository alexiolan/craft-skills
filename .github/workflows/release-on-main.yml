name: Release on main

# Auto-bumps patch version, creates a tag, and publishes a GitHub release
# whenever a commit lands on main (typically a PR merge).
#
# Replaces the local .githooks/{pre,post}-commit that previously did this on
# every local commit. GitHub Actions is the single source of truth for releases.
#
# Skip with [skip release] in the commit message, or it will skip itself when
# the commit is the bot's own version-bump commit (recursion prevention).

on:
  push:
    branches: [main]

jobs:
  release:
    if: >-
      !contains(github.event.head_commit.message, '[skip release]')
      && github.event.head_commit.author.email != 'github-actions[bot]@users.noreply.github.com'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        id: bump
        run: |
          CURRENT=$(grep -o '"version": "[^"]*"' package.json | head -1 | grep -o '[0-9]*\.[0-9]*\.[0-9]*')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "Bumping $CURRENT → $NEW"

          sed -i "s/\"version\": \"$CURRENT\"/\"version\": \"$NEW\"/" package.json
          sed -i -E "s/\"version\": \"[0-9]+\.[0-9]+\.[0-9]+\"/\"version\": \"$NEW\"/g" .claude-plugin/plugin.json .claude-plugin/marketplace.json

          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "tag=v$NEW" >> $GITHUB_OUTPUT

      - name: Commit version bump and create tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip release]"
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin main --tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use the merge-commit message (HEAD~1, since we just added a bump commit) as release notes
          NOTES=$(git log -1 --pretty=%B HEAD~1)
          gh release create "${{ steps.bump.outputs.tag }}" \
            --title "${{ steps.bump.outputs.tag }}" \
            --notes "$NOTES"
